<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ShipTrack — Shipment Tracking</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0a0f1e;
  --surface:      #111827;
  --surface2:     #1a2236;
  --surface3:     #202d42;
  --border:       rgba(255,255,255,0.07);
  --primary:      #6366f1;
  --primary-d:    #4f46e5;
  --primary-glow: rgba(99,102,241,0.25);
  --transit:      #3b82f6;
  --delivered:    #10b981;
  --returned:     #f59e0b;
  --danger:       #ef4444;
  --text:         #f1f5f9;
  --muted:        #64748b;
  --muted2:       #94a3b8;
  --r:            14px;
  --sidebar:      290px;
  --panel:        380px;
  --hh:           62px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--hh);
  background: rgba(10,15,30,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px; z-index: 100;
}

.logo {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(99,102,241,0.4);
}

.brand { line-height: 1.2; }
.brand-name {
  font-size: 17px; font-weight: 800;
  background: linear-gradient(135deg, #e2e8f0, #94a3b8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-sub { font-size: 11px; color: var(--muted); }

.spacer { flex: 1; }

.header-time { font-size: 12px; color: var(--muted); }

.menu-btn {
  display: none; background: none; border: none;
  color: var(--text); font-size: 22px; cursor: pointer;
  padding: 6px 8px; border-radius: 8px;
  transition: background 0.2s;
}
.menu-btn:hover { background: var(--surface2); }

/* ===== LAYOUT ===== */
.layout {
  display: flex;
  margin-top: var(--hh);
  min-height: calc(100vh - var(--hh));
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar); flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  position: fixed; top: var(--hh); bottom: 0; left: 0;
  overflow-y: auto; z-index: 50;
  transition: transform 0.32s cubic-bezier(.4,0,.2,1);
}

/* ===== MAIN ===== */
.main {
  flex: 1; margin-left: var(--sidebar);
  padding: 20px; min-width: 0;
}

/* ===== STATS ===== */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 14px;
}

.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 10px;
  text-align: center; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  inset: 0; opacity: 0;
  background: radial-gradient(circle at 50% 0%, var(--glow, #6366f1), transparent 70%);
  transition: opacity 0.3s;
}
.stat-card:hover::before, .stat-card.active::before { opacity: 0.15; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.35); }
.stat-card.active { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary), 0 6px 20px var(--primary-glow); }

.stat-card[data-s="Total"]     { --glow: #a855f7; }
.stat-card[data-s="Transit"]   { --glow: #3b82f6; }
.stat-card[data-s="Delivered"] { --glow: #10b981; }
.stat-card[data-s="Returned"]  { --glow: #f59e0b; }

.stat-icon { font-size: 22px; margin-bottom: 6px; }
.stat-val  { font-size: 26px; font-weight: 900; line-height: 1; margin-bottom: 3px; }
.stat-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }

.stat-card[data-s="Total"]     .stat-val { color: #c084fc; }
.stat-card[data-s="Transit"]   .stat-val { color: #60a5fa; }
.stat-card[data-s="Delivered"] .stat-val { color: #34d399; }
.stat-card[data-s="Returned"]  .stat-val { color: #fbbf24; }

/* ===== CHART ===== */
.chart-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 14px;
}
.card-title {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
}

/* ===== ADD BTN ===== */
.add-btn {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, var(--primary), var(--primary-d));
  color: white; border: none; border-radius: var(--r);
  font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px var(--primary-glow);
  transition: transform 0.2s, box-shadow 0.2s;
  font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.add-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px var(--primary-glow); }

/* ===== FILTER BAR ===== */
.filter-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  margin-bottom: 16px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
}

.fg { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 130px; }
.fg label { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }

/* ===== INPUTS ===== */
input, select {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text);
  padding: 9px 13px; font-size: 14px; font-family: inherit;
  outline: none; width: 100%;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
input::placeholder { color: var(--muted); }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.6); cursor: pointer; }
select option { background: var(--surface2); }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; border-radius: 9px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; white-space: nowrap; font-family: inherit;
}
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-d)); color: #fff; box-shadow: 0 4px 14px var(--primary-glow); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 7px 20px var(--primary-glow); }
.btn-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,.3); }
.btn-success:hover { transform: translateY(-1px); }
.btn-danger  { background: linear-gradient(135deg, var(--danger), #dc2626); color: #fff; box-shadow: 0 4px 14px rgba(239,68,68,.3); }
.btn-danger:hover  { transform: translateY(-1px); }
.btn-ghost   { background: var(--surface2); color: var(--muted2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.15); }
.btn-sm { padding: 7px 13px; font-size: 12px; }
.btn-icon { width: 36px; height: 36px; padding: 0; flex-shrink: 0; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ===== TABLE ===== */
.table-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.table-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 8px;
}
.table-hdr-title { font-size: 14px; font-weight: 700; }
.table-cnt { font-size: 12px; color: var(--muted); margin-top: 2px; }

.tbl-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 680px; }

thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
th {
  padding: 11px 16px; text-align: left;
  font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
  color: var(--muted2); font-weight: 700; white-space: nowrap; cursor: pointer;
  user-select: none;
}
th:hover { color: var(--text); }

td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }

tbody tr { transition: background 0.15s; cursor: pointer; }
tbody tr:hover { background: rgba(255,255,255,.025); }
tbody tr.selected { background: rgba(99,102,241,.1); }
tbody tr.selected td:first-child { box-shadow: inset 3px 0 0 var(--primary); }
tbody tr:last-child td { border-bottom: none; }

/* ===== BADGES ===== */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.b-transit   { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }
.b-delivered { background: rgba(16,185,129,.12); color: #34d399; border: 1px solid rgba(16,185,129,.25); }
.b-returned  { background: rgba(245,158,11,.12);  color: #fbbf24; border: 1px solid rgba(245,158,11,.25); }

/* ===== FILE LINK ===== */
.flink {
  color: #818cf8; text-decoration: none; font-size: 12px;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 6px;
  background: rgba(99,102,241,.1);
  transition: background 0.2s;
}
.flink:hover { background: rgba(99,102,241,.2); }

/* ===== FORM PANEL ===== */
.form-panel {
  position: fixed; top: var(--hh); right: 0; bottom: 0;
  width: var(--panel); background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 0; overflow: hidden; z-index: 150;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.form-panel.open { transform: translateX(0); }

.fp-header {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: var(--surface2);
}
.fp-title { font-size: 15px; font-weight: 800; }

.fp-body { flex: 1; overflow-y: auto; padding: 20px; }

.fgrp { margin-bottom: 16px; }
.fgrp label {
  display: block; font-size: 11px; color: var(--muted2);
  text-transform: uppercase; letter-spacing: .06em;
  font-weight: 700; margin-bottom: 7px;
}

/* File input */
.finput-row { display: flex; gap: 6px; align-items: center; }
.finput-row input[type="file"] { display: none; }
.fdisp {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 13px; font-size: 12px;
  color: var(--muted); cursor: pointer; transition: border-color 0.2s;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.fdisp:hover { border-color: var(--primary); color: var(--muted2); }

.fp-actions {
  padding: 16px 20px; border-top: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  flex-shrink: 0; background: var(--surface);
}
.fp-actions .btn-primary { grid-column: span 2; }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 24px; right: 24px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  color: white; font-size: 26px; border: none; cursor: pointer;
  box-shadow: 0 8px 24px rgba(99,102,241,.5); z-index: 200;
  transition: transform 0.25s, box-shadow 0.25s;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 12px 32px rgba(99,102,241,.6); }
.fab.active { transform: rotate(45deg); }

/* ===== TOAST ===== */
.toast-wrap {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 999; display: flex; flex-direction: column;
  gap: 8px; align-items: center; pointer-events: none;
}
.toast {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 22px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,.45);
  animation: tIn 0.3s ease; pointer-events: auto;
  max-width: 300px; text-align: center;
  transition: opacity 0.3s, transform 0.3s;
}
.toast-ok  { border-color: rgba(16,185,129,.4); color: #34d399; }
.toast-err { border-color: rgba(239,68,68,.4); color: #f87171; }
@keyframes tIn {
  from { opacity:0; transform: translateY(16px) scale(.92); }
  to   { opacity:1; transform: translateY(0)    scale(1); }
}

/* ===== OVERLAY (mobile) ===== */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 49;
}
.overlay.show { display: block; }

/* ===== EMPTY STATE ===== */
.empty {
  text-align: center; padding: 56px 20px; color: var(--muted);
}
.empty-ico { font-size: 52px; margin-bottom: 14px; opacity: .3; }
.empty-txt { font-size: 14px; }

/* ===== SPINNER ===== */
.spin {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.25);
  border-top-color: white; border-radius: 50%;
  animation: sp .65s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.22); }

/* ===== DIVIDER ===== */
.div { height: 1px; background: var(--border); margin: 14px 0; }

/* ===== RESPONSIVE ===== */
@media (max-width: 820px) {
  :root { --sidebar: 270px; --panel: 100%; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 12px; }
  .menu-btn { display: flex; }
  .header-time { display: none; }
  .fab { bottom: 88px; }
}

@media (max-width: 480px) {
  .filter-bar { padding: 12px; }
  .fg { min-width: 100%; }
  .fp-actions { grid-template-columns: 1fr; }
  .fp-actions .btn-primary { grid-column: span 1; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="logo">📦</div>
  <div class="brand">
    <div class="brand-name">ShipTrack</div>
    <div class="brand-sub">Shipment Tracking System</div>
  </div>
  <div class="spacer"></div>
  <div class="header-time" id="clock"></div>
</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="card-title">📊 Overview</div>
    <div class="stats-grid">
      <div class="stat-card" data-s="Total" onclick="quickFilter('')">
        <div class="stat-icon">📦</div>
        <div class="stat-val" id="s-total">—</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-card" data-s="Transit" onclick="quickFilter('Transit')">
        <div class="stat-icon">🚚</div>
        <div class="stat-val" id="s-transit">—</div>
        <div class="stat-lbl">Transit</div>
      </div>
      <div class="stat-card" data-s="Delivered" onclick="quickFilter('Delivered')">
        <div class="stat-icon">✅</div>
        <div class="stat-val" id="s-delivered">—</div>
        <div class="stat-lbl">Delivered</div>
      </div>
      <div class="stat-card" data-s="Returned" onclick="quickFilter('Returned')">
        <div class="stat-icon">↩️</div>
        <div class="stat-val" id="s-returned">—</div>
        <div class="stat-lbl">Returned</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="card-title">Status Breakdown</div>
      <canvas id="barChart" height="155"></canvas>
    </div>

    <div class="div"></div>
    <button class="add-btn" onclick="openForm()">＋ &nbsp;Add Shipment</button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="fg">
        <label>📅 Ship Date</label>
        <input type="date" id="fDate" oninput="applyFilter()">
      </div>
      <div class="fg">
        <label>🔍 AWB No.</label>
        <input type="text" id="fAwb" placeholder="Search…" oninput="applyFilter()">
      </div>
      <div class="fg">
        <label>🏷 Status</label>
        <select id="fStatus" onchange="applyFilter()">
          <option value="">All Status</option>
          <option>Transit</option>
          <option>Delivered</option>
          <option>Returned</option>
        </select>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="resetFilter()">↺ Reset</button>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-hdr">
        <div>
          <div class="table-hdr-title">Shipments</div>
          <div class="table-cnt" id="tCnt">Loading…</div>
        </div>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>AWB No.</th>
              <th>Cost</th>
              <th>Status</th>
              <th>Invoice</th>
              <th>AWB File</th>
            </tr>
          </thead>
          <tbody id="tBody">
            <tr><td colspan="7"><div class="empty"><div class="empty-ico">⏳</div><div class="empty-txt">Loading…</div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="togglePanel()" title="Add Shipment">+</button>

<!-- FORM PANEL -->
<div class="form-panel" id="fPanel">
  <div class="fp-header">
    <span class="fp-title" id="fpTitle">Add Shipment</span>
    <button class="btn btn-icon btn-ghost" onclick="closePanel()">✕</button>
  </div>
  <div class="fp-body">
    <input type="hidden" id="eid">

    <div class="fgrp">
      <label>📅 Date</label>
      <input type="date" id="iDate">
    </div>
    <div class="fgrp">
      <label>✈️ AWB No. <span style="color:var(--danger)">*</span></label>
      <input type="text" id="iAwb" placeholder="Enter AWB number">
    </div>
    <div class="fgrp">
      <label>💰 Shipping Cost</label>
      <input type="number" id="iCost" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="fgrp">
      <label>🏷 Status</label>
      <select id="iStatus">
        <option>Transit</option>
        <option>Delivered</option>
        <option>Returned</option>
      </select>
    </div>

    <div class="fgrp">
      <label>📄 Invoice File</label>
      <div class="finput-row">
        <div class="fdisp" id="invDisp" onclick="document.getElementById('iInv').click()">
          Click to upload…
        </div>
        <input type="file" id="iInv" accept=".pdf,.png,.jpg,.jpeg" onchange="setDisp('iInv','invDisp')">
        <button class="btn btn-ghost btn-icon btn-sm" id="invOpen" onclick="openF('inv')" style="display:none" title="View">👁️</button>
      </div>
    </div>

    <div class="fgrp">
      <label>📋 AWB File</label>
      <div class="finput-row">
        <div class="fdisp" id="awbDisp" onclick="document.getElementById('iAwbF').click()">
          Click to upload…
        </div>
        <input type="file" id="iAwbF" accept=".pdf,.png,.jpg,.jpeg" onchange="setDisp('iAwbF','awbDisp')">
        <button class="btn btn-ghost btn-icon btn-sm" id="awbOpen" onclick="openF('awb')" style="display:none" title="View">👁️</button>
      </div>
    </div>
  </div>

  <div class="fp-actions">
    <button class="btn btn-primary" id="subBtn" onclick="submitForm()">＋ Add Shipment</button>
    <button class="btn btn-danger"  id="delBtn" onclick="deleteRow()" style="display:none">🗑 Delete</button>
    <button class="btn btn-ghost"   onclick="clearForm()">Clear</button>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toasts"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
let chart = null;
let rows  = [];
let eid   = null;
let exInv = '', exAwb = '';

// ── Clock ──────────────────────────────────────────────────────────
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleString([], {dateStyle:'medium', timeStyle:'short'});
}
tick(); setInterval(tick, 30000);

// ── Date helpers ───────────────────────────────────────────────────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function stored2input(s) {   // "25, Mar, 2026" → "2026-03-25"
  if (!s) return '';
  const p = s.replace(/,/g,'').trim().split(/\s+/);
  if (p.length !== 3) return '';
  const d = +p[0], m = MONTHS.indexOf(p[1]), y = +p[2];
  if (isNaN(d) || m < 0 || isNaN(y)) return '';
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function input2stored(s) {   // "2026-03-25" → "25, Mar, 2026"
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${+d}, ${MONTHS[+m-1]}, ${y}`;
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const w = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${ok ? 'toast-ok' : 'toast-err'}`;
  t.textContent = (ok ? '✓ ' : '✕ ') + msg;
  w.appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateY(16px)';
    setTimeout(() => t.remove(), 320);
  }, 2600);
}

// ── Sidebar ────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── Panel ──────────────────────────────────────────────────────────
function togglePanel() {
  document.getElementById('fPanel').classList.contains('open') ? closePanel() : openForm();
}
function closePanel() {
  document.getElementById('fPanel').classList.remove('open');
  document.getElementById('fab').classList.remove('active');
}

function openForm(ship) {
  const panel = document.getElementById('fPanel');
  panel.classList.add('open');
  document.getElementById('fab').classList.add('active');

  if (ship) {
    eid = ship.id; exInv = ship.invoice_file || ''; exAwb = ship.awb_file || '';
    document.getElementById('fpTitle').textContent = 'Edit Shipment';
    document.getElementById('subBtn').textContent  = '💾 Update';
    document.getElementById('delBtn').style.display = '';
    document.getElementById('eid').value   = ship.id;
    document.getElementById('iDate').value = stored2input(ship.ship_date);
    document.getElementById('iAwb').value  = ship.awb;
    document.getElementById('iCost').value = ship.shipping_cost || '';
    document.getElementById('iStatus').value = ship.status;
    if (exInv) { document.getElementById('invDisp').textContent = exInv; document.getElementById('invOpen').style.display = ''; }
    else        { document.getElementById('invDisp').textContent = 'Click to upload…'; document.getElementById('invOpen').style.display = 'none'; }
    if (exAwb) { document.getElementById('awbDisp').textContent = exAwb; document.getElementById('awbOpen').style.display = ''; }
    else        { document.getElementById('awbDisp').textContent = 'Click to upload…'; document.getElementById('awbOpen').style.display = 'none'; }
  } else {
    clearForm();
  }
  if (window.innerWidth <= 820) closeSidebar();
}

function clearForm() {
  eid = null; exInv = ''; exAwb = '';
  document.getElementById('fpTitle').textContent = 'Add Shipment';
  document.getElementById('subBtn').textContent  = '＋ Add Shipment';
  document.getElementById('delBtn').style.display = 'none';
  document.getElementById('eid').value   = '';
  document.getElementById('iDate').value = todayStr();
  document.getElementById('iAwb').value  = '';
  document.getElementById('iCost').value = '';
  document.getElementById('iStatus').value = 'Transit';
  document.getElementById('iInv').value   = '';
  document.getElementById('iAwbF').value  = '';
  document.getElementById('invDisp').textContent = 'Click to upload…';
  document.getElementById('awbDisp').textContent = 'Click to upload…';
  document.getElementById('invOpen').style.display = 'none';
  document.getElementById('awbOpen').style.display = 'none';
}

function setDisp(inpId, dispId) {
  const f = document.getElementById(inpId).files[0];
  document.getElementById(dispId).textContent = f ? f.name : 'Click to upload…';
}

function openF(t) {
  const fn = t === 'inv' ? exInv : exAwb;
  if (fn) window.open('/uploads/' + fn, '_blank');
}

// ── Submit ──────────────────────────────────────────────────────────
async function submitForm() {
  const awb = document.getElementById('iAwb').value.trim();
  if (!awb) { toast('AWB No. is required', false); return; }

  const fd = new FormData();
  fd.append('ship_date',      input2stored(document.getElementById('iDate').value));
  fd.append('awb',            awb);
  fd.append('shipping_cost',  document.getElementById('iCost').value || '0');
  fd.append('status',         document.getElementById('iStatus').value);
  const inv  = document.getElementById('iInv').files[0];
  const awbf = document.getElementById('iAwbF').files[0];
  if (inv)  fd.append('invoice_file', inv);
  if (awbf) fd.append('awb_file', awbf);

  const btn    = document.getElementById('subBtn');
  const wasNew = !eid;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  try {
    const url    = eid ? `/api/shipments/${eid}` : '/api/shipments';
    const method = eid ? 'PUT' : 'POST';
    const res    = await fetch(url, { method, body: fd });
    const json   = await res.json();
    if (json.error) {
      toast(json.error, false);
    } else {
      toast(wasNew ? 'Shipment added!' : 'Shipment updated!');
      if (json.record) {
        if (wasNew) {
          rows.unshift(json.record);
        } else {
          const idx = rows.findIndex(r => r.id === json.record.id);
          if (idx >= 0) rows[idx] = json.record; else rows.unshift(json.record);
        }
      }
      clearForm();
      closePanel();
      recalcStats();
      applyFilter();
    }
  } catch { toast('Request failed', false); }
  finally {
    btn.disabled = false;
    btn.textContent = wasNew ? '＋ Add Shipment' : '💾 Update';
  }
}

async function deleteRow() {
  if (!eid || !confirm('Delete this shipment?')) return;
  const deletedId = eid;
  try {
    await fetch(`/api/shipments/${deletedId}`, { method: 'DELETE' });
    toast('Deleted');
    rows = rows.filter(r => r.id !== deletedId);
    clearForm();
    closePanel();
    recalcStats();
    applyFilter();
  } catch { toast('Delete failed', false); }
}

// ── Filter ─────────────────────────────────────────────────────────
function applyFilter() {
  const date   = document.getElementById('fDate').value;
  const awb    = document.getElementById('fAwb').value.toLowerCase();
  const status = document.getElementById('fStatus').value;

  let data = rows;
  if (date)   data = data.filter(r => r.ship_date === input2stored(date));
  if (awb)    data = data.filter(r => r.awb.toLowerCase().includes(awb));
  if (status) data = data.filter(r => r.status === status);

  renderTable(data);
}

function resetFilter() {
  document.getElementById('fDate').value   = '';
  document.getElementById('fAwb').value    = '';
  document.getElementById('fStatus').value = '';
  renderTable(rows);
}

function quickFilter(status) {
  document.getElementById('fStatus').value = status;
  document.getElementById('fDate').value   = '';
  document.getElementById('fAwb').value    = '';
  applyFilter();
  document.querySelectorAll('.stat-card').forEach(c => {
    c.classList.toggle('active', c.dataset.s === (status || 'Total') && !status || (status && c.dataset.s === status));
  });
  if (window.innerWidth <= 820) closeSidebar();
}

// ── Recalc stats from local rows (instant, no server round-trip) ────
function recalcStats() {
  const d = { Total: rows.length, Transit: 0, Delivered: 0, Returned: 0 };
  rows.forEach(r => { if (d[r.status] !== undefined) d[r.status]++; });
  updateStats(d); updateChart(d);
}

// ── Load data ───────────────────────────────────────────────────────
async function loadData() {
  try {
    const [rShip, rDash] = await Promise.all([
      fetch('/api/shipments'), fetch('/api/dashboard')
    ]);
    rows = await rShip.json();
    const dash = await rDash.json();
    updateStats(dash); updateChart(dash); applyFilter();
  } catch { toast('Failed to load', false); }
}

// ── Stats ───────────────────────────────────────────────────────────
function updateStats(d) {
  document.getElementById('s-total').textContent     = d.Total;
  document.getElementById('s-transit').textContent   = d.Transit;
  document.getElementById('s-delivered').textContent = d.Delivered;
  document.getElementById('s-returned').textContent  = d.Returned;
}

// ── Chart ────────────────────────────────────────────────────────────
function updateChart(d) {
  const ctx = document.getElementById('barChart').getContext('2d');
  if (chart) { chart.destroy(); }
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Total', 'Transit', 'Delivered', 'Returned'],
      datasets: [{
        data: [d.Total, d.Transit, d.Delivered, d.Returned],
        backgroundColor: ['rgba(168,85,247,.7)', 'rgba(59,130,246,.7)', 'rgba(16,185,129,.7)', 'rgba(245,158,11,.7)'],
        borderColor:     ['#a855f7', '#3b82f6', '#10b981', '#f59e0b'],
        borderWidth: 2, borderRadius: 7, borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2236', titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          borderColor: 'rgba(255,255,255,.08)', borderWidth: 1, padding: 10,
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#64748b', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#64748b', font: { size: 10 }, stepSize: 1 }, beginAtZero: true }
      }
    }
  });
}

// ── Render table ─────────────────────────────────────────────────────
function renderTable(data) {
  document.getElementById('tCnt').textContent = `${data.length} record${data.length !== 1 ? 's' : ''}`;
  const tb = document.getElementById('tBody');
  if (!data.length) {
    tb.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">No shipments found</div></div></td></tr>`;
    return;
  }
  tb.innerHTML = data.map(r => `
    <tr id="r${r.id}" onclick="selectRow(${r.id})">
      <td style="color:var(--muted);font-size:11px">${r.id}</td>
      <td>${r.ship_date || '—'}</td>
      <td><strong style="font-size:13px">${r.awb}</strong></td>
      <td>${(+r.shipping_cost || 0).toFixed(2)}</td>
      <td>${badge(r.status)}</td>
      <td>${r.invoice_file ? `<a href="/uploads/${r.invoice_file}" target="_blank" class="flink">📄 View</a>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td>${r.awb_file     ? `<a href="/uploads/${r.awb_file}"     target="_blank" class="flink">📋 View</a>` : '<span style="color:var(--muted)">—</span>'}</td>
    </tr>`).join('');
}

function badge(s) {
  const cls = { Transit:'b-transit', Delivered:'b-delivered', Returned:'b-returned' };
  const ico = { Transit:'🚚', Delivered:'✅', Returned:'↩️' };
  return `<span class="badge ${cls[s]||''}">${ico[s]||''} ${s}</span>`;
}

function selectRow(id) {
  document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
  const tr = document.getElementById(`r${id}`);
  if (tr) tr.classList.add('selected');
  const ship = rows.find(r => r.id === id);
  if (ship) openForm(ship);
}

// ── Init ─────────────────────────────────────────────────────────────
document.getElementById('iDate').value = todayStr();
loadData();
</script>
</body>
</html>
